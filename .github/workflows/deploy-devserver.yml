name: Deploy to Devserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy app on devserver

        run: |

          cd ~/deploy/caddy/sites/cesarscoffeecup
          git pull origin main
          docker compose up -d --build
          docker exec coffe_app bash -lc "cd /var/www && php artisan optimize:clear"
          npm run build
