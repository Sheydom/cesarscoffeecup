services:
  cesarscoffeecup:
    build: .
    container_name: cesarscoffeecup
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - caddy_net



  queue:
    build: .
    container_name: cesarscoffeecup-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
    - .:/var/www
    networks:
    - caddy_net


networks:
  caddy_net:
    external: true
